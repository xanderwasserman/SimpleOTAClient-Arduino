# Lints the library with arduino-lint and compiles all examples against
# Arduino-ESP32 on every push and PR to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Arduino lint (strict, library-manager update)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/arduino-lint-action@v2
        with:
          project-type: library
          library-manager: update
          compliance: strict

  compile:
    name: Compile examples (ESP32)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile sketches
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - source-path: ./
          enable-deltas-report: true
          sketches-report-path: sketches-reports

      - name: Upload sketches report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sketches-reports
          path: sketches-reports
